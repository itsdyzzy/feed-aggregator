  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1f1f1f;
      --accent: #e8ff00;
      --text: #f0f0f0;
      --muted: #555;
      --neon: #CCFF00;
      --hot: #FF3D00;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(12px);
      z-index: 100;
      height: 64px;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.15em;
      color: var(--accent);
    }
    .logo span {
      color: var(--muted);
      font-size: 0.65rem;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: 0.3em;
      display: block;
      margin-top: -6px;
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    .nav-links a {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--accent); }
    .nav-links a.active { color: var(--neon); }

    .social-icons {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .social-icons a {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      transition: color 0.2s;
      width: 20px;
      height: 20px;
    }
    .social-icons a:hover { color: var(--accent); }
    .social-icons svg { width: 16px; height: 16px; fill: currentColor; }

    /* ─── Page Title ─────────────────────────────────────────────────────── */
    .page-header {
      padding: 2.5rem 2rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      letter-spacing: 0.08em;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .page-title .neon-dot {
      width: 10px;
      height: 10px;
      background: var(--neon);
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 12px rgba(204,255,0,0.4);
    }
    .page-subtitle {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 0.05em;
    }

    /* ─── Controls ────────────────────────────────────────────────────────── */
    .controls {
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .search-wrap {
      flex: 1;
      min-width: 160px;
      max-width: 420px;
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
    }
    input[type="search"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.6rem 1rem 0.6rem 2.5rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border 0.2s;
    }
    input[type="search"]:focus { border-color: var(--accent); }
    input[type="search"]::placeholder { color: var(--muted); }

    .stats-info {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .stats-info strong { color: var(--text); }

    /* ─── Video Grid ──────────────────────────────────────────────────────── */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1px;
      background: var(--border);
      padding-top: 1px;
    }

    .video-card {
      background: var(--bg);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      transition: background 0.2s;
      animation: fadeUp 0.4s ease both;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }
    .video-card:hover { background: var(--surface); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .video-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .channel-tag {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 500;
      padding: 0.2rem 0.5rem;
      border: 1px solid;
      color: var(--neon);
      border-color: var(--neon);
    }
    .video-date {
      font-size: 0.7rem;
      color: var(--muted);
    }

    .video-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      background: var(--surface);
      display: block;
      contain: layout;
    }

    .video-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.25rem;
      line-height: 1.2;
      letter-spacing: 0.03em;
      color: var(--text);
    }

    .video-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: auto;
      width: fit-content;
    }
    .video-link:hover { text-decoration: underline; }

    /* ─── Loader ───────────────────────────────────────────────────────────── */
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      padding: 5rem 2rem;
      grid-column: 1/-1;
    }
    .loader-bars { display: flex; gap: 4px; align-items: flex-end; height: 32px; }
    .loader-bars span { display: block; width: 4px; background: var(--accent); animation: bar 1s ease-in-out infinite; }
    .loader-bars span:nth-child(1) { animation-delay: 0s; }
    .loader-bars span:nth-child(2) { animation-delay: 0.15s; }
    .loader-bars span:nth-child(3) { animation-delay: 0.3s; }
    .loader-bars span:nth-child(4) { animation-delay: 0.45s; }
    .loader-bars span:nth-child(5) { animation-delay: 0.6s; }
    @keyframes bar {
      0%, 100% { height: 8px; opacity: 0.3; }
      50% { height: 32px; opacity: 1; }
    }
    .loader-text {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .load-more-wrap {
      grid-column: 1/-1;
      display: flex;
      justify-content: center;
      padding: 2rem;
    }
    .load-more-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.6rem 2rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .load-more-btn:hover { border-color: var(--neon); color: var(--neon); }

    .state-msg {
      grid-column: 1/-1;
      padding: 5rem 2rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ─── Mobile ───────────────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      header { padding: 0 1rem; height: 56px; }
      .logo { font-size: 1.6rem; }
      .logo span { font-size: 0.55rem; }
      .nav-links { gap: 1rem; }
      .nav-links a { font-size: 0.7rem; }
      .page-header { padding: 1.5rem 1rem 1rem; }
      .page-title { font-size: 2rem; }
      .controls { padding: 1rem; }
      .video-grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
      .video-card { padding: 1rem; }
    }

    @media (max-width: 480px) {
      header { padding: 0 0.75rem; height: 52px; }
      .logo { font-size: 1.4rem; letter-spacing: 0.1em; }
      .logo span { display: none; }
      .nav-links { gap: 0.75rem; }
      .nav-links a { font-size: 0.65rem; letter-spacing: 0.05em; }
      .social-icons { display: none; }
      .page-header { padding: 1.25rem 0.75rem 0.75rem; }
      .page-title { font-size: 1.6rem; }
      .controls { padding: 0.75rem; }
      .video-grid { grid-template-columns: 1fr; }
      .video-card { padding: 0.75rem; }
      .video-title { font-size: 1.05rem; }
    }
  </style>
</head>

  <div class="page-title"><span class="neon-dot"></span> VIDEOS</div>

<div class="controls">

    <input type="search" id="searchInput" placeholder="Search videos..." oninput="filterVideos()"/>

  </div>
  <nav style="display:flex;flex-wrap:wrap;gap:1.5rem;align-items:center;">
    <a href="/about" style="font-size:0.72rem;color:var(--muted);text-decoration:none;letter-spacing:0.1em;text-transform:uppercase;transition:color 0.2s" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">About</a>
    <a href="/privacy" style="font-size:0.72rem;color:var(--muted);text-decoration:none;letter-spacing:0.1em;text-transform:uppercase;transition:color 0.2s" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">Privacy Policy</a>
    <a href="/terms" style="font-size:0.72rem;color:var(--muted);text-decoration:none;letter-spacing:0.1em;text-transform:uppercase;transition:color 0.2s" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">Terms &amp; Conditions</a>
    <a href="/contact" style="font-size:0.72rem;color:var(--muted);text-decoration:none;letter-spacing:0.1em;text-transform:uppercase;transition:color 0.2s" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">Contact</a>
  </nav>
</footer>

<script>
  let allVideos = [];
  let visibleCount = 24;
  const PAGE_SIZE = 24;

  function timeAgo(dateStr) {
    if (!dateStr) return '';
    const date = new Date(dateStr);
    if (isNaN(date.getTime())) return '';
    const diff = Date.now() - date.getTime();
    if (diff < 0) return 'just now';
    const mins = Math.floor(diff / 60000);
    if (mins < 60) return mins + 'm ago';
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    const days = Math.floor(hrs / 24);
    if (days < 7) return days + 'd ago';
    return Math.floor(days / 7) + 'w ago';
  }

  function filterVideos() {
    visibleCount = PAGE_SIZE;
    renderVideos();
  }

  function renderVideos() {
    const grid = document.getElementById('videoGrid');
    const query = document.getElementById('searchInput').value.toLowerCase();

    let filtered = allVideos;
    if (query) {
      filtered = filtered.filter(v =>
        v.title.toLowerCase().includes(query) || (v.channel || '').toLowerCase().includes(query)
      );
    }

    document.getElementById('statsInfo').innerHTML = `<strong>${filtered.length}</strong> Videos from <strong>${new Set(allVideos.map(v => v.channel)).size}</strong> Channels`;

    if (filtered.length === 0) {
      grid.innerHTML = '<div class="state-msg">No videos found</div>';
      return;
    }

    const visible = filtered.slice(0, visibleCount);
    let html = '';

    visible.forEach((v, i) => {
      html += `
        <a class="video-card" href="${v.link}" target="_blank" rel="noopener" style="animation-delay:${Math.min(i * 0.03, 0.5)}s">
          <div class="video-meta">
            <span class="channel-tag">${v.channel || ''}</span>
            <span class="video-date">${timeAgo(v.date)}</span>
          </div>
          <img class="video-thumb" src="${v.thumbnail}" alt="${v.title.replace(/"/g, '')}" loading="${i < 8 ? 'eager' : 'lazy'}" onerror="this.style.display='none'"/>
          <div class="video-title">${v.title}</div>
          <span class="video-link">Watch Full Video →</span>
        </a>`;
    });

    if (visibleCount < filtered.length) {
      html += `
        <div class="load-more-wrap">
          <button class="load-more-btn" onclick="loadMore()">Load More ↓</button>
        </div>`;
    }

    grid.innerHTML = html;
  }

  function loadMore() {
    visibleCount += PAGE_SIZE;
    renderVideos();
    // Scroll to where new content starts
  }

  async function loadVideos() {
    try {
      const res = await fetch('/api/videos');
      const data = await res.json();
      allVideos = data.videos || [];
      renderVideos();
    } catch(e) {
      document.getElementById('videoGrid').innerHTML = '<div class="state-msg">Could not load videos</div>';
    }
  }

  loadVideos();
</script>
