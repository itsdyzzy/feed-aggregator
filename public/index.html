<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FEED — Culture & Style</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1f1f1f;
      --accent: #e8ff00;
      --text: #f0f0f0;
      --muted: #555;
      --tag-hype: #ff3c3c;
      --tag-high: #3caaff;
      --tag-complex: #ff8c00;
      --tag-mn: #00cc88;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(12px);
      z-index: 100;
      height: 64px;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.15em;
      color: var(--accent);
    }

    .logo span {
      color: var(--muted);
      font-size: 0.65rem;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: 0.3em;
      display: block;
      margin-top: -6px;
      text-transform: uppercase;
    }

    .refresh-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.4rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
    .refresh-btn.spinning { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .ticker {
      background: var(--accent);
      color: #000;
      overflow: hidden;
      white-space: nowrap;
      padding: 0.4rem 0;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.15em;
    }
    .ticker-inner {
      display: inline-block;
      animation: ticker 40s linear infinite;
    }
    @keyframes ticker {
      from { transform: translateX(100vw); }
      to { transform: translateX(-100%); }
    }

    .controls {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-wrap {
      flex: 1;
      min-width: 200px;
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
    }
    input[type="search"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.6rem 1rem 0.6rem 2.5rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border 0.2s;
    }
    input[type="search"]:focus { border-color: var(--accent); }
    input[type="search"]::placeholder { color: var(--muted); }

    .filters { display: flex; gap: 0.5rem; flex-wrap: wrap; }

    .filter-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.5rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: var(--text); color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 500; }
    .filter-btn[data-source="hypebeast"].active { background: var(--tag-hype); border-color: var(--tag-hype); color: #fff; }
    .filter-btn[data-source="highsnobiety"].active { background: var(--tag-high); border-color: var(--tag-high); color: #fff; }
    .filter-btn[data-source="complex"].active { background: var(--tag-complex); border-color: var(--tag-complex); color: #fff; }
    .filter-btn[data-source="modernnotoriety"].active { background: var(--tag-mn); border-color: var(--tag-mn); color: #000; }

    .stats-bar {
      padding: 0.75rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 2rem;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .stats-bar strong { color: var(--text); }

    .error-banner {
      background: #1a0a0a;
      border: 1px solid #3a1a1a;
      color: #ff6b6b;
      padding: 0.75rem 2rem;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1px;
      background: var(--border);
      padding-top: 1px;
    }

    .card {
      background: var(--bg);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      transition: background 0.2s;
      animation: fadeUp 0.4s ease both;
      cursor: pointer;
    }
    .card:hover { background: var(--surface); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-meta { display: flex; justify-content: space-between; align-items: center; }

    .source-tag {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 500;
      padding: 0.2rem 0.5rem;
      border: 1px solid;
    }
    .source-tag.hypebeast { color: var(--tag-hype); border-color: var(--tag-hype); }
    .source-tag.highsnobiety { color: var(--tag-high); border-color: var(--tag-high); }
    .source-tag.complex { color: var(--tag-complex); border-color: var(--tag-complex); }
    .source-tag.modernnotoriety { color: var(--tag-mn); border-color: var(--tag-mn); }

    .card-date { font-size: 0.7rem; color: var(--muted); }

    .card-img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      background: var(--surface);
      display: block;
    }

    .card-img-placeholder {
      width: 100%;
      aspect-ratio: 16/9;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--border);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 0.2em;
    }

    .card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.25rem;
      line-height: 1.2;
      letter-spacing: 0.03em;
      color: var(--text);
    }

    .card-desc {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: auto;
      width: fit-content;
    }
    .card-link:hover { text-decoration: underline; }

    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      padding: 5rem 2rem;
      grid-column: 1/-1;
    }
    .loader-bars { display: flex; gap: 4px; align-items: flex-end; height: 32px; }
    .loader-bars span { display: block; width: 4px; background: var(--accent); animation: bar 1s ease-in-out infinite; }
    .loader-bars span:nth-child(1) { animation-delay: 0s; }
    .loader-bars span:nth-child(2) { animation-delay: 0.15s; }
    .loader-bars span:nth-child(3) { animation-delay: 0.3s; }
    .loader-bars span:nth-child(4) { animation-delay: 0.45s; }
    .loader-bars span:nth-child(5) { animation-delay: 0.6s; }
    @keyframes bar {
      0%, 100% { height: 8px; opacity: 0.3; }
      50% { height: 32px; opacity: 1; }
    }
    .loader-text {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .state-msg {
      grid-column: 1/-1;
      padding: 5rem 2rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    FEED
    <span>Culture &amp; Style Aggregator</span>
  </div>
  <div>
    <button class="refresh-btn" id="refreshBtn" onclick="refresh()">↻ Refresh</button>
  </div>
</header>

<div class="ticker">
  <div class="ticker-inner" id="tickerText">LOADING LATEST DROPS &nbsp;·&nbsp; HYPEBEAST &nbsp;·&nbsp; HIGHSNOBIETY &nbsp;·&nbsp; COMPLEX &nbsp;·&nbsp; STAY TUNED &nbsp;·&nbsp;&nbsp;</div>
</div>

<div class="controls">
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="search" id="searchInput" placeholder="Search articles..." oninput="renderArticles()"/>
  </div>
  <div class="filters">
    <button class="filter-btn active" data-source="all" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" data-source="hypebeast" onclick="setFilter('hypebeast', this)">Hypebeast</button>
    <button class="filter-btn" data-source="highsnobiety" onclick="setFilter('highsnobiety', this)">Highsnobiety</button>
    <button class="filter-btn" data-source="complex" onclick="setFilter('complex', this)">Complex</button>
    <button class="filter-btn" data-source="modernnotoriety" onclick="setFilter('modernnotoriety', this)">Modern Notoriety</button>
  </div>
</div>

<div class="stats-bar" id="statsBar"><span>Loading feeds…</span></div>
<div id="errorBanner" style="display:none" class="error-banner"></div>

<div class="grid" id="grid">
  <div class="loader">
    <div class="loader-bars"><span></span><span></span><span></span><span></span><span></span></div>
    <div class="loader-text">Fetching latest articles</div>
  </div>
</div>

<script>
  let allArticles = [];
  let activeFilter = 'all';

  function timeAgo(dateStr) {
    if (!dateStr) return '';
    const diff = Date.now() - new Date(dateStr).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    return `${Math.floor(hrs / 24)}d ago`;
  }

  function setFilter(source, btn) {
    activeFilter = source;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderArticles();
  }

  function renderArticles() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const grid = document.getElementById('grid');

    let filtered = allArticles;
    if (activeFilter !== 'all') filtered = filtered.filter(a => a.source === activeFilter);
    if (query) filtered = filtered.filter(a =>
      a.title.toLowerCase().includes(query) || (a.description || '').toLowerCase().includes(query)
    );

    // Update stats
    const counts = { hypebeast: 0, highsnobiety: 0, complex: 0, modernnotoriety: 0 };
    allArticles.forEach(a => { if (counts[a.source] !== undefined) counts[a.source]++; });
    document.getElementById('statsBar').innerHTML = `
      <span><strong>${filtered.length}</strong> Articles Shown</span>
      <span>Hypebeast <strong>${counts.hypebeast}</strong></span>
      <span>Highsnobiety <strong>${counts.highsnobiety}</strong></span>
      <span>Complex <strong>${counts.complex}</strong></span>
      <span>Modern Notoriety <strong>${counts.modernnotoriety}</strong></span>
    `;

    if (filtered.length === 0) {
      grid.innerHTML = '<div class="state-msg">No articles found</div>';
      return;
    }

    grid.innerHTML = filtered.map((a, i) => `
      <div class="card" style="animation-delay:${Math.min(i * 0.04, 0.6)}s" onclick="window.open('${a.link}','_blank')">
        <div class="card-meta">
          <span class="source-tag ${a.source}">${a.sourceName}</span>
          <span class="card-date">${timeAgo(a.date)}</span>
        </div>
        ${a.image
          ? `<img class="card-img" src="${a.image}" alt="${a.title.replace(/"/g,'')}" loading="lazy" onerror="this.style.display='none'">`
          : `<div class="card-img-placeholder">${a.sourceName}</div>`
        }
        <div class="card-title">${a.title}</div>
        ${a.description ? `<div class="card-desc">${a.description}</div>` : ''}
        <a class="card-link" href="${a.link}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
          Read Full Article →
        </a>
      </div>
    `).join('');

    // Update ticker
    const titles = filtered.slice(0, 10).map(a => a.title).join(' &nbsp;·&nbsp; ');
    document.getElementById('tickerText').innerHTML = titles + ' &nbsp;·&nbsp;&nbsp;';
  }

  async function loadArticles() {
    try {
      const res = await fetch('/api/articles');
      const data = await res.json();
      allArticles = data.articles || [];
      renderArticles();
      document.getElementById('errorBanner').style.display = 'none';
    } catch (e) {
      document.getElementById('errorBanner').textContent = 'Could not load articles. Retrying...';
      document.getElementById('errorBanner').style.display = 'block';
      document.getElementById('grid').innerHTML = '<div class="state-msg">Error loading feeds</div>';
    }
  }

  async function refresh() {
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('spinning');
    btn.disabled = true;
    document.getElementById('grid').innerHTML = `
      <div class="loader">
        <div class="loader-bars"><span></span><span></span><span></span><span></span><span></span></div>
        <div class="loader-text">Refreshing feeds…</div>
      </div>`;
    try {
      const res = await fetch('/api/refresh');
      const data = await res.json();
      allArticles = data.articles || [];
      renderArticles();
    } catch (e) {
      document.getElementById('errorBanner').textContent = 'Refresh failed. Please try again.';
      document.getElementById('errorBanner').style.display = 'block';
    } finally {
      btn.classList.remove('spinning');
      btn.disabled = false;
    }
  }

  // Load on page open
  loadArticles();

  // Auto-refresh every 15 minutes
  setInterval(loadArticles, 15 * 60 * 1000);
</script>
</body>
</html>
